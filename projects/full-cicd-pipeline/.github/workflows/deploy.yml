name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/devops-demo-app:latest
          ghcr.io/${{ github.repository }}/devops-demo-app:${{ github.sha }}

    - name: Deploy to Kubernetes
      run: |
        echo "Deploying to Kubernetes..."
        # In real scenario, configure kubectl with cluster credentials
        # kubectl set image deployment/devops-demo-app app=ghcr.io/${{ github.repository }}/devops-demo-app:${{ github.sha }}
