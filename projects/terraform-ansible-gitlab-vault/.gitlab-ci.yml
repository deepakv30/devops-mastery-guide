stages:
  - validate
  - plan
  - apply
  - configure

variables:
  TF_ROOT: "$CI_PROJECT_DIR/terraform"

cache:
  paths:
    - .terraform/

validate:
  stage: validate
  script:
    - cd $TF_ROOT
    - terraform init
    - terraform validate

plan:
  stage: plan
  script:
    - cd $TF_ROOT
    - terraform init
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - $TF_ROOT/tfplan
    expire_in: 1 week

apply:
  stage: apply
  environment:
    name: $CI_COMMIT_REF_NAME
    url: https://$CI_ENVIRONMENT_SLUG.example.com
  script:
    - cd $TF_ROOT
    - terraform init
    - terraform apply -auto-approve tfplan
  when: manual
  only:
    - main
    - develop

configure:
  stage: configure
  script:
    - echo "Authenticating to Vault using AppRole..."
    # Example Vault login (replace with real secrets/variables)
    - vault login -method=approle role_id=$VAULT_ROLE_ID secret_id=$VAULT_SECRET_ID
    - echo "Running Ansible playbook with Vault secrets..."
    - ansible-galaxy collection install community.hashi_vault
    - ansible-playbook ansible/playbook.yml -i "$TF_ROOT/ansible_inventory" --extra-vars "ansible_user=ubuntu"
  needs: ["apply"]
  when: manual
